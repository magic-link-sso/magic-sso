# Magic Link SSO Gate configuration
#
# Copy this file to `gate/magic-gate.toml` and adjust the values for your
# environment. Then point `MAGIC_GATE_CONFIG_FILE` at the copied file.

[gate]
port = 4000
mode = "subdomain"
namespace = "/_magicgate"
publicOrigin = "http://localhost:4000"
upstreamUrl = "http://localhost:3007"
directUse = true
requestTimeoutMs = 10000
rateLimitMax = 240
# Optional: set rateLimitRedisUrl to share rate limits across gate replicas.
# rateLimitRedisUrl = "redis://redis:6379/0"
# rateLimitKeyPrefix = "magic-sso-gate"
rateLimitWindowMs = 60000
trustProxy = false
wsEnabled = true

[auth]
jwtSecret = "replace-with-a-real-jwt-secret-at-least-32-chars"
previewSecret = "replace-with-a-real-preview-secret-at-least-32-chars"
serverUrl = "http://localhost:3000"

[cookie]
name = "magic-sso"
path = "/"
maxAge = 3600
