[changelog]
header = """
# Changelog

All notable changes to Magic Link SSO will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project follows
[Semantic Versioning](https://semver.org/spec/v2.0.0.html) for public releases.

"""
body = """
{% macro print_commit(commit) -%}
  - {% if commit.scope %}({{ commit.scope }}) {% endif %}\
    {{ commit.message | upper_first }}\
{% endmacro -%}

{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}

{% for commit in commits -%}
  {{ self::print_commit(commit=commit) }}
{% endfor -%}
{% endfor -%}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
filter_commits = true
split_commits = false
protect_breaking_commits = true
tag_pattern = "^v[0-9].*"
sort_commits = "oldest"
commit_parsers = [
    { message = "^chore\\(release\\):", skip = true },
    { message = "^[^:!]+(?:\\([^)]*\\))?!:", group = "Breaking Changes" },
    { footer = "^BREAKING CHANGE:", group = "Breaking Changes" },
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Changed" },
    { message = "^docs", group = "Documentation" },
    { message = "^chore", group = "Chore" },
]
