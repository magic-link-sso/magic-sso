[server]
appPort = 43100
appUrl = "http://localhost:43100"
logLevel = "error"

[auth]
csrfSecret = "test-csrf-secret-for-e2e-suite-123456"
jwtSecret = "test-jwt-secret-for-e2e-suite-123456"
emailSecret = "test-email-secret-for-e2e-suite-12345"
previewSecret = "test-preview-secret-for-e2e-suite-123"

[cookie]
name = "magic-sso"
secure = false

[email]
from = "noreply@example.com"

[email.smtp]
host = "127.0.0.1"
port = 43125
user = "test-user"
pass = "test-password"
secure = false

[[sites]]
id = "nextjs"
origins = ["http://localhost:43101"]
allowedRedirectUris = ["http://localhost:43101/verify-email", "http://localhost:43101/*"]
allowedEmails = ["nextjs@example.com"]

[sites.hostedAuth.branding]
title = "Next.js Example"
logoText = "NX"

