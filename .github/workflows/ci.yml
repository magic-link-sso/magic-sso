name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.30.3
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:js

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.30.3
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Django example dependencies
        working-directory: examples/django
        run: uv sync --all-groups

      - name: Install Playwright Chromium
        run: pnpm --filter magic-sso-e2e exec playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: pnpm test:e2e

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - packages/django
          - examples/django
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Sync dependencies
        working-directory: ${{ matrix.project }}
        run: uv sync --all-groups

      - name: Ruff format check
        working-directory: ${{ matrix.project }}
        run: uv run ruff format --check .

      - name: Ruff lint
        working-directory: ${{ matrix.project }}
        run: uv run ruff check .

      - name: Type check
        working-directory: ${{ matrix.project }}
        run: |
          if [ "${{ matrix.project }}" = "examples/django" ]; then
            PYTHONPATH=../../packages/django uv run ty check
          else
            uv run ty check
          fi

      - name: Test
        working-directory: ${{ matrix.project }}
        run: uv run pytest
