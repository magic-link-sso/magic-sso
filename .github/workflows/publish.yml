name: Publish

# Required GitHub configuration:
# - npm trusted publisher configured for each npm package with workflow filename `publish.yml`
# - Environment: pypi (trusted publishing / OIDC enabled)

on:
  push:
    tags:
      - 'v*'

jobs:
  verify-release:
    name: Verify Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.30.3
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: .node-version
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Audit dependencies
        run: pnpm run audit

      - name: Verify managed release versions match the tag
        run: node scripts/verify-release-tag.mjs "$GITHUB_REF_NAME"

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Sync Django example dependencies for E2E
        working-directory: examples/django
        run: uv sync --all-groups

      - name: Install Playwright Chromium
        run: pnpm --filter magic-sso-e2e exec playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: pnpm test:e2e

  publish-npm:
    name: Publish to npm
    needs: verify-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing / OIDC
    env:
      RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 10.30.3
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: .node-version
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Normalize release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Check if @magic-link-sso/nextjs is already on npm
        id: nextjs-published
        run: |
          if npm view "@magic-link-sso/nextjs@${RELEASE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish @magic-link-sso/nextjs
        if: steps.nextjs-published.outputs.published != 'true'
        working-directory: packages/nextjs
        run: npm publish --access public

      - name: Check if @magic-link-sso/nuxt is already on npm
        id: nuxt-published
        run: |
          if npm view "@magic-link-sso/nuxt@${RELEASE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish @magic-link-sso/nuxt
        if: steps.nuxt-published.outputs.published != 'true'
        working-directory: packages/nuxt
        run: npm publish --access public

      - name: Check if @magic-link-sso/angular is already on npm
        id: angular-published
        run: |
          if npm view "@magic-link-sso/angular@${RELEASE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish @magic-link-sso/angular
        if: steps.angular-published.outputs.published != 'true'
        working-directory: packages/angular
        run: npm publish --access public

  publish-pypi:
    name: Publish to PyPI
    needs: verify-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/magic-link-sso-django/
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing
    env:
      RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Normalize release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Sync dependencies
        working-directory: packages/django
        run: uv sync --all-groups

      - name: Run tests
        working-directory: packages/django
        run: uv run pytest

      - name: Build distribution
        working-directory: packages/django
        run: uv build

      - name: Check if magic-link-sso-django is already on PyPI
        id: django-pypi-published
        run: |
          if curl --silent --fail "https://pypi.org/pypi/magic-link-sso-django/${RELEASE_VERSION}/json" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI
        if: steps.django-pypi-published.outputs.published != 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1.14.0
        with:
          packages-dir: packages/django/dist/

  github-release:
    name: Create GitHub Release
    needs:
      - publish-npm
      - publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: .node-version

      - name: Extract release notes from CHANGELOG.md
        run: node scripts/extract-release-notes.mjs "$GITHUB_REF_NAME" > release-notes.md

      - name: Create or update GitHub Release
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md
          fi
