<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#F8FAFC" rx="32"/>
  <defs>
    <linearGradient id="cyanCore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284C7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="magentaCore" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#BE185D"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </linearGradient>
    <filter id="softShadow">
      <feGaussianBlur stdDeviation="6" result="blur" in="SourceAlpha"/>
      <feOffset dy="4" result="offsetBlur"/>
      <feComponentTransfer in="offsetBlur" result="shadowBlur">
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadowBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(0 -12)">
    <g transform="translate(200 180) scale(1.4) translate(-200 -180)">
      <!-- Cyberpunk Envelope -->
      <g filter="url(#softShadow)" stroke-width="4" fill="none">
        <rect x="80" y="110" width="240" height="150" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
        <path d="M 80 110 L 200 180 L 320 110" stroke="url(#cyanCore)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Cyber circuit lines on the envelope -->
        <path d="M 80 260 L 140 220 L 140 200" stroke="url(#magentaCore)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 320 260 L 260 220 L 260 200" stroke="url(#magentaCore)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <!-- Central Keyhole & Shield -->
      <g filter="url(#softShadow)">
        <!-- Security Shield -->
        <path d="M 200 135 L 230 150 L 230 190 C 230 215 200 235 200 235 C 200 235 170 215 170 190 L 170 150 Z" fill="#FFFFFF" stroke="url(#magentaCore)" stroke-width="4" stroke-linejoin="round"/>

        <!-- Keyhole cutout -->
        <circle cx="200" cy="170" r="12" fill="url(#cyanCore)"/>
        <path d="M 192 175 L 208 175 L 210 205 L 190 205 Z" fill="url(#cyanCore)"/>

        <!-- Magic Sparkles -->
        <path d="M 200 100 L 202 110 L 212 112 L 202 114 L 200 124 L 198 114 L 188 112 L 198 110 Z" fill="#F59E0B"/>
        <path d="M 235 130 L 237 135 L 242 137 L 237 139 L 235 144 L 233 139 L 228 137 L 233 135 Z" fill="#0EA5E9"/>
        <path d="M 165 130 L 167 135 L 172 137 L 167 139 L 165 144 L 163 139 L 158 137 L 163 135 Z" fill="#F43F5E"/>
      </g>
    </g>

    <!-- Typography -->
    <text x="50%" y="90%" font-family="'Inter', system-ui, sans-serif" font-weight="900" font-size="32" fill="#1E293B" text-anchor="middle" letter-spacing="5">MAGIC LINK SSO</text>
  </g>
</svg>
