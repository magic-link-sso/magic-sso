<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Django: Sign In</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --color-background: #eef4ff;
        --color-surface: rgba(255, 255, 255, 0.96);
        --color-text: #172554;
        --color-muted: #334155;
        --color-border: #64748b;
        --color-border-soft: #cbd5e1;
        --color-field-background: #ffffff;
        --color-button-background: #1d4ed8;
        --color-button-background-hover: #1e40af;
        --color-button-text: #ffffff;
        --color-focus: #0f766e;
        --color-success-background: #dcfce7;
        --color-success-text: #166534;
        --color-error-background: #fee2e2;
        --color-error-text: #991b1b;
        --shadow-panel: 0 24px 64px rgba(37, 99, 235, 0.16);
        font-family: Arial, sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --color-background: #020617;
          --color-surface: rgba(7, 18, 32, 0.84);
          --color-text: #e2f6f4;
          --color-muted: #a5c7cf;
          --color-border: rgba(148, 163, 184, 0.42);
          --color-border-soft: rgba(94, 234, 212, 0.16);
          --color-field-background: rgba(15, 23, 42, 0.92);
          --color-button-background: #67e8f9;
          --color-button-background-hover: #5eead4;
          --color-button-text: #04131f;
          --color-focus: #67e8f9;
          --color-success-background: rgba(16, 185, 129, 0.12);
          --color-success-text: #bbf7d0;
          --color-error-background: rgba(251, 113, 133, 0.12);
          --color-error-text: #fecdd3;
          --shadow-panel: 0 32px 100px rgba(2, 6, 23, 0.58);
        }
      }

      html {
        background-color: var(--color-background);
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--color-text);
        background:
          radial-gradient(circle at top, rgba(96, 165, 250, 0.2), transparent 42%),
          var(--color-background);
      }

      @media (prefers-color-scheme: dark) {
        body {
          background:
            radial-gradient(circle at top, rgba(45, 212, 191, 0.18), transparent 34%),
            linear-gradient(180deg, #020617 0%, #0f172a 100%);
        }
      }

      .skip-link {
        position: absolute;
        left: 1rem;
        top: 1rem;
        transform: translateY(-200%);
        padding: 0.75rem 1rem;
        border-radius: 999px;
        background-color: var(--color-button-background);
        color: var(--color-button-text);
        text-decoration: none;
      }

      .skip-link:focus {
        transform: translateY(0);
      }

      @media (prefers-color-scheme: dark) {
        .skip-link {
          background-color: #5eead4;
          color: #04131f;
        }
      }

      .page-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem 1rem;
      }

      .form-container {
        width: min(100%, 28rem);
        padding: 2rem;
        border: 1px solid var(--color-border-soft);
        border-radius: 1.5rem;
        background-color: var(--color-surface);
        box-shadow: var(--shadow-panel);
        backdrop-filter: blur(18px);
      }

      .eyebrow {
        margin: 0 0 0.75rem;
        color: var(--color-muted);
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 2.7rem);
        line-height: 1.05;
      }

      .lede {
        margin: 1rem 0 0;
        color: var(--color-muted);
        line-height: 1.6;
      }

      .signin-form {
        margin-top: 1.5rem;
      }

      .field-group {
        display: grid;
        gap: 0.5rem;
      }

      .field-label {
        font-weight: 700;
      }

      input {
        width: 100%;
        padding: 0.9rem 1rem;
        border: 1px solid var(--color-border);
        border-radius: 0.9rem;
        font: inherit;
        color: var(--color-text);
        background-color: var(--color-field-background);
      }

      input::placeholder {
        color: var(--color-muted);
        opacity: 1;
      }

      @media (prefers-color-scheme: dark) {
        input::placeholder {
          color: #64748b;
        }
      }

      .submit-button {
        position: relative;
        width: 100%;
        margin-top: 1rem;
        padding: 0.9rem 1rem;
        border: 0;
        border-radius: 999px;
        font: inherit;
        font-weight: 700;
        color: var(--color-button-text);
        background-color: var(--color-button-background);
        cursor: pointer;
      }

      .button-content {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .button-spinner {
        display: grid;
        place-items: center;
        width: 0;
        height: 1rem;
        margin-right: 0;
        overflow: hidden;
        transition:
          width 150ms ease,
          margin-right 150ms ease,
          opacity 150ms ease;
        border: 2px solid currentColor;
        border-right-color: transparent;
        border-radius: 999px;
        opacity: 0;
      }

      .submit-button.is-pending .button-spinner {
        width: 1rem;
        margin-right: 0.7rem;
        opacity: 1;
        animation: spin 900ms linear infinite;
      }

      @media (prefers-color-scheme: dark) {
        .submit-button {
          background-image: linear-gradient(135deg, #67e8f9, #5eead4);
        }
      }

      .submit-button:hover {
        background-color: var(--color-button-background-hover);
      }

      .submit-button:disabled {
        cursor: not-allowed;
        opacity: 0.75;
      }

      :focus-visible {
        outline: 3px solid var(--color-focus);
        outline-offset: 3px;
      }

      .message {
        margin-top: 1rem;
        padding: 0.9rem 1rem;
        border: 1px solid transparent;
        border-radius: 1rem;
        line-height: 1.5;
      }

      .message.success {
        border-color: rgba(22, 101, 52, 0.2);
        background-color: var(--color-success-background);
        color: var(--color-success-text);
      }

      .message.error {
        border-color: rgba(153, 27, 27, 0.2);
        background-color: var(--color-error-background);
        color: var(--color-error-text);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-color-scheme: dark) {
        .message.success {
          border-color: rgba(16, 185, 129, 0.24);
        }

        .message.error {
          border-color: rgba(251, 113, 133, 0.24);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to sign-in form</a>
    <main class="page-shell" id="main-content">
      <section class="form-container" aria-labelledby="signin-title">
        <h1 id="signin-title">Sign in</h1>
        <p class="lede" id="signin-help">We&apos;ll email you a sign-in link.</p>

        <form
          class="signin-form"
          method="post"
          aria-describedby="signin-help"
          onsubmit="
            const button = document.getElementById('submit');
            button.classList.add('is-pending');
            button.disabled = true;
            button.setAttribute('aria-disabled', 'true');
          "
        >
          {% csrf_token %}
          <input type="hidden" name="returnUrl" value="{{ return_url }}" />
          {% if scope %}
          <input type="hidden" name="scope" value="{{ scope }}" />
          {% endif %}
          <div class="field-group">
            <label class="field-label" for="email">Email</label>
            <input
              id="email"
              type="email"
              name="email"
              autocomplete="email"
              inputmode="email"
              spellcheck="false"
              placeholder="you@example.com"
              aria-describedby="{% if error %}signin-help signin-feedback{% else %}signin-help{% endif %}"
              required
              autofocus
            />
          </div>
          <button id="submit" type="submit" class="submit-button">
            <span class="button-content">
              <span id="submit-spinner" class="button-spinner" aria-hidden="true"></span>
              <span>Send magic link</span>
            </span>
          </button>
        </form>

        {% if message %}
        <div class="message success" id="signin-feedback" role="status" aria-live="polite">
          {{ message }}
        </div>
        {% endif %} {% if error %}
        <div class="message error" id="signin-feedback" role="alert">{{ error }}</div>
        {% endif %}
      </section>
    </main>
  </body>
</html>
