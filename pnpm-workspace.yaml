packages:
    - manager
    - packages/config-core
    - packages/example-ui
    - server
    - gate
    - packages/angular
    - packages/nextjs
    - packages/nuxt
    - examples/angular
    - examples/django
    - examples/fastify
    - examples/gate-private1-app
    - examples/gate-private2-static
    - examples/nextjs
    - examples/nuxt
    - examples/photos
    - tests/e2e

allowBuilds:
    '@parcel/watcher': false
    esbuild: true
    lmdb: false
    msgpackr-extract: false
    sharp: false

minimumReleaseAgeExclude:
    - esbuild@0.28.1
    - nodemailer@9.0.1
    - vite@8.0.16
    - '@types/node@25.9.1'
    - '@types/react@19.2.15'
    - postcss@8.5.15
    - tsx@4.22.3
    - '@playwright/test@1.61.0'
    - '@vitest/coverage-v8@4.1.9'
    - '@vitest/expect@4.1.9'
    - '@vitest/mocker@4.1.9'
    - '@vitest/pretty-format@4.1.9'
    - '@vitest/runner@4.1.9'
    - '@vitest/snapshot@4.1.9'
    - '@vitest/spy@4.1.9'
    - '@vitest/utils@4.1.9'
    - playwright-core@1.61.0
    - playwright@1.61.0
    - vitest@4.1.9
    - '@fallow-cli/darwin-arm64@2.97.0'
    - '@fallow-cli/darwin-x64@2.97.0'
    - '@fallow-cli/linux-arm64-gnu@2.97.0'
    - '@fallow-cli/linux-arm64-musl@2.97.0'
    - '@fallow-cli/linux-x64-gnu@2.97.0'
    - '@fallow-cli/linux-x64-musl@2.97.0'
    - '@fallow-cli/win32-arm64-msvc@2.97.0'
    - '@fallow-cli/win32-x64-msvc@2.97.0'
    - fallow@2.97.0

overrides:
